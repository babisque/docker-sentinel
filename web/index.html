<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SENTINEL // MISSION CONTROL</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #0d0d0d;
            --text-green: #00ff41;
            --alert-red: #ff0000;
            --border: 2px solid #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        header {
            border-bottom: var(--border);
            margin-bottom: 20px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        #dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            overflow-y: auto;
            flex-grow: 1;
            align-content: start;
        }

        .container-card {
            background: var(--panel-bg);
            border: var(--border);
            padding: 15px;
            position: relative;
        }

        .stat-line { margin: 5px 0; }
        .bar-outer { background: #222; height: 10px; width: 100%; margin-top: 5px; }
        .bar-inner { background: var(--text-green); height: 100%; width: 0%; transition: width 0.3s; }
        
        /* Brutalist Log Terminal */
        #log-terminal {
            margin-top: 20px;
            background: #0a0a0a;
            border: var(--border);
            height: 200px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        #log-header {
            border-bottom: 1px solid #333;
            padding: 5px 10px;
            font-size: 0.8em;
            color: #666;
            background: #111;
        }

        #log-content {
            padding: 10px;
            font-size: 0.85em;
            overflow-y: auto;
            flex-grow: 1;
        }

        .log-entry { margin-bottom: 4px; border-left: 2px solid #333; padding-left: 10px; }
        .log-alert { color: var(--alert-red); border-left-color: var(--alert-red); font-weight: bold; }

        .pico { color: var(--alert-red); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
    </style>
</head>
<body>
    <header>
        <span>SENTINEL v1.0 // SYSTEM MONITOR</span>
        <span id="status">STATUS: DISCONNECTED</span>
    </header>

    <div id="dashboard">
        </div>

    <div id="log-terminal">
        <div id="log-header">> COMMS_ESTABLISHED // ALERT_STREAM</div>
        <div id="log-content"></div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        const dashboard = document.getElementById('dashboard');
        const logContent = document.getElementById('log-content');

        ws.onopen = () => {
            document.getElementById('status').innerText = 'STATUS: CONNECTED';
            appendLog("CONNECTION ESTABLISHED WITH CORE.");
        };

        ws.onclose = () => {
            document.getElementById('status').innerText = 'STATUS: DISCONNECTED';
            appendLog("CONNECTION LOST.", true);
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.cpu_percentage !== undefined) {
                updateContainer(data);
            } 
            else if (data.Level !== undefined) {
                appendLog(`[${data.Level}] ${data.ContainerName}: ${data.Message}`, true);
            }
            else if (data.type === "lifecycle" && data.action === "die") {
                removeContainer(data.container_id);
            }
        };

        function updateContainer(s) {
            let card = document.getElementById(s.container_id);
            if (!card) {
                card = document.createElement('div');
                card.id = s.container_id;
                card.className = 'container-card';
                dashboard.appendChild(card);
                appendLog(`MONITORING STARTED: ${s.container_name.replace('/', '')}`);
            }

            const cpuPico = s.cpu_percentage > 80 ? 'pico' : '';
            
            card.innerHTML = `
                <div style="font-weight: bold; border-bottom: 1px solid #333; margin-bottom: 10px">
                    ID: ${s.container_name.replace('/', '')}
                </div>
                <div class="stat-line ${cpuPico}">CPU: ${s.cpu_percentage.toFixed(2)}%</div>
                <div class="bar-outer"><div class="bar-inner" style="width: ${s.cpu_percentage}%"></div></div>
                
                <div class="stat-line">RAM: ${s.memory_usage.toFixed(2)} MB</div>
                <div class="bar-outer"><div class="bar-inner" style="width: ${s.mem_percent}%"></div></div>
            `;
        }

        function removeContainer(id) {
            const card = document.getElementById(id);
            if (card) {
                card.remove();
                appendLog(`CONTAINER DISCONNECTED: ${id.substring(0, 12)}...`);
            }
        }

        function appendLog(text, isAlert = false) {
            const entry = document.createElement('div');
            entry.className = `log-entry ${isAlert ? 'log-alert' : ''}`;
            const time = new Date().toLocaleTimeString();
            entry.innerText = `> ${time} ${text}`;
            logContent.appendChild(entry);
            
            logContent.scrollTop = logContent.scrollHeight;
        }
    </script>
</body>
</html>
